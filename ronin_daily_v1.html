<script id="engine">
// ===== Ronin Daily Engine (pure logic, no DOM) =====
// Generated 1:1 from tests/engine.mjs — keep in sync (tests/parity.mjs enforces).
const RoninEngine = (() => {

const N = 13, C = 6;
const ARMY_MOVES = 2;    // distinct army pieces moved per army turn
const GEN_MAX_TRIES = 400;
const EPOCH_UTC = Date.UTC(2026, 6, 4); // puzzle #1 = 2026-07-04 (local date)

// Difficulty modes. HARD's salt/steps/band are the original v1 values — its daily
// boards are IDENTICAL to everything published before modes existed (regression-
// tested in rules.mjs). Do not touch salts/steps/bands of a shipped mode.
const MODES = {
  normal: { key: 'normal', steps: 3, parMin: 6, parMax: 10, salt: 0x4E524D4C }, // "NRML"
  hard:   { key: 'hard',   steps: 2, parMin: 8, parMax: 14, salt: 0x524F4E49 }, // "RONI"
  // epic: reserved — future mechanics (leap/grapple/sight-lines), solver + lab work first
};

const START_TILES = [[0,0],[0,6],[0,12],[6,0],[6,12],[12,0],[12,6],[12,12]];

const key = (r, c) => r * 13 + c;
const cheb = (r1, c1, r2, c2) => Math.max(Math.abs(r1 - r2), Math.abs(c1 - c2));
const ringOf = (r, c) => Math.max(Math.abs(r - C), Math.abs(c - C));
// tiers: 0 emperor, 1 inner, 2 middle, 3 bottom
const tierOf = (r, c) => { const d = ringOf(r, c); return d === 0 ? 0 : d <= 2 ? 1 : d <= 4 ? 2 : 3; };

function hash32(a, b) {
  let h = 2166136261 >>> 0;
  h = Math.imul(h ^ (a >>> 0), 16777619);
  h = Math.imul(h ^ (b >>> 0), 16777619);
  h ^= h >>> 13; h = Math.imul(h, 0x5bd1e995); h ^= h >>> 15;
  return h >>> 0;
}

function mulberry32(seed) {
  let t = seed >>> 0;
  return function () {
    t = (t + 0x6D2B79F5) | 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function shuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

function dayNumber(date) {
  const d = date || new Date();
  return Math.floor((Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) - EPOCH_UTC) / 86400000) + 1;
}

// Geometry-only step legality (ignores occupancy).
function stepLegal(fr, fc, tr, tc, stairs) {
  if (tr < 0 || tr > 12 || tc < 0 || tc > 12) return false;
  if (cheb(fr, fc, tr, tc) !== 1) return false;
  if (tr === C && tc === C) return false; // emperor tile unwalkable
  const a = tierOf(fr, fc), b = tierOf(tr, tc);
  if (a === b) return true;
  return stairs.has(key(fr, fc)) || stairs.has(key(tr, tc));
}

// Deterministic army reply (mode-independent). Returns { army, moves, captured }.
function armyReply(ronin, army, stairs) {
  const arr = army.map(p => ({ r: p.r, c: p.c }));
  const order = arr.map((_, i) => i).sort((x, y) => {
    const dx = cheb(arr[x].r, arr[x].c, ronin.r, ronin.c);
    const dy = cheb(arr[y].r, arr[y].c, ronin.r, ronin.c);
    return dx - dy || x - y;
  });
  const occ = new Set(arr.map(p => key(p.r, p.c)));
  const moves = [];
  let done = 0;
  for (const i of order) {
    if (done >= ARMY_MOVES) break;
    const a = arr[i];
    // guards step 8-directionally toward the ronin (chebyshev); if the diagonal
    // is blocked by a wall or occupant, fall back to the dominant orthogonal axis
    const dr = Math.sign(ronin.r - a.r), dc = Math.sign(ronin.c - a.c);
    if (dr === 0 && dc === 0) continue;
    let tr = a.r + dr, tc = a.c + dc;
    if (!stepLegal(a.r, a.c, tr, tc, stairs) || occ.has(key(tr, tc))) {
      const rd = Math.abs(ronin.r - a.r), cd = Math.abs(ronin.c - a.c);
      const tries = (rd >= cd) ? [[a.r + dr, a.c], [a.r, a.c + dc]] : [[a.r, a.c + dc], [a.r + dr, a.c]];
      let picked = null;
      for (const [er, ec] of tries) {
        if (er === a.r && ec === a.c) continue;
        if (!stepLegal(a.r, a.c, er, ec, stairs)) continue; // never reach through a wall
        if (er === ronin.r && ec === ronin.c) { picked = [er, ec]; break; }
        if (!occ.has(key(er, ec))) { picked = [er, ec]; break; }
      }
      if (!picked) continue;
      tr = picked[0]; tc = picked[1];
    }
    if (tr === ronin.r && tc === ronin.c) {
      moves.push({ i, from: { r: a.r, c: a.c }, to: { r: tr, c: tc } });
      a.r = tr; a.c = tc;
      return { army: arr, moves, captured: true };
    }
    if (occ.has(key(tr, tc))) continue;
    occ.delete(key(a.r, a.c)); occ.add(key(tr, tc));
    moves.push({ i, from: { r: a.r, c: a.c }, to: { r: tr, c: tc } });
    a.r = tr; a.c = tc; done++;
  }
  return { army: arr, moves, captured: false };
}

const needSteps = (steps) => { if (!Number.isInteger(steps) || steps < 1) throw new Error('steps (per-mode) required'); };

// All distinct end-tiles the ronin can finish a turn on (1..steps steps),
// plus a "hold" pseudo-endpoint (step out and back) whenever any step exists.
function roninOptions(ronin, army, stairs, steps) {
  needSteps(steps);
  const occ = new Set(army.map(p => key(p.r, p.c)));
  const seen = new Set([key(ronin.r, ronin.c)]);
  let frontier = [ronin];
  const out = [];
  let anyStep = false;
  for (let s = 0; s < steps; s++) {
    const nxt = [];
    for (const p of frontier) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = p.r + dr, nc = p.c + dc;
        if (!stepLegal(p.r, p.c, nr, nc, stairs)) continue;
        const k = key(nr, nc);
        if (occ.has(k) || seen.has(k)) continue;
        seen.add(k);
        const q = { r: nr, c: nc };
        nxt.push(q); out.push(q);
        anyStep = true;
      }
    }
    frontier = nxt;
  }
  if (anyStep) out.push({ r: ronin.r, c: ronin.c, hold: true });
  return out;
}

// Shortest legal step-path (<= steps) from ronin to target, or null.
function pathTo(ronin, army, stairs, target, steps) {
  needSteps(steps);
  if (target.hold || (target.r === ronin.r && target.c === ronin.c)) {
    // out-and-back on any legal neighbour
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = ronin.r + dr, nc = ronin.c + dc;
      if (!stepLegal(ronin.r, ronin.c, nr, nc, stairs)) continue;
      if (army.some(p => p.r === nr && p.c === nc)) continue;
      return [{ r: nr, c: nc }, { r: ronin.r, c: ronin.c }];
    }
    return null;
  }
  const occ = new Set(army.map(p => key(p.r, p.c)));
  const prev = new Map([[key(ronin.r, ronin.c), null]]);
  let frontier = [ronin];
  for (let s = 0; s < steps; s++) {
    const nxt = [];
    for (const p of frontier) {
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (!dr && !dc) continue;
        const nr = p.r + dr, nc = p.c + dc;
        if (!stepLegal(p.r, p.c, nr, nc, stairs)) continue;
        const k = key(nr, nc);
        if (occ.has(k) || prev.has(k)) continue;
        prev.set(k, p);
        if (nr === target.r && nc === target.c) {
          const path = [];
          let cur = { r: nr, c: nc };
          while (cur && !(cur.r === ronin.r && cur.c === ronin.c)) {
            path.unshift({ r: cur.r, c: cur.c });
            cur = prev.get(key(cur.r, cur.c));
          }
          return path;
        }
        nxt.push({ r: nr, c: nc });
      }
    }
    frontier = nxt;
  }
  return null;
}

// A* over (ronin, army) states; army reply is deterministic, so this is
// single-agent search. opts.steps REQUIRED (per-mode). Returns { par, nodes, path? }
// or null. par counts ronin turns including the final Ascend.
function solveBoard(board, opts = {}) {
  const steps = opts.steps; needSteps(steps);
  const stairs = board.stairs instanceof Set ? board.stairs : new Set(board.stairs);
  const maxNodes = opts.maxNodes ?? 250000;
  const fLimit = Math.min(opts.fLimit ?? 60, 60);
  const wantPath = !!opts.wantPath;
  const h = (r, c) => { const d = ringOf(r, c); return d <= 1 ? 1 : Math.ceil((d - 1) / steps) + 1; };
  const sKey = (ro, ar) => { let s = '' + (ro.r * 13 + ro.c); for (const p of ar) s += ',' + (p.r * 13 + p.c); return s; };

  const start = { ro: { r: board.ronin.r, c: board.ronin.c }, army: board.army.map(p => ({ r: p.r, c: p.c })), g: 0 };
  const f0 = h(start.ro.r, start.ro.c);
  if (f0 > fLimit) return null;

  const buckets = [];
  const push = (f, node) => { (buckets[f] || (buckets[f] = [])).push(node); };
  const visited = new Map();
  const parent = wantPath ? new Map() : null;
  const k0 = sKey(start.ro, start.army);
  visited.set(k0, 0);
  if (wantPath) parent.set(k0, null);
  push(f0, start);

  let nodes = 0;
  for (let f = f0; f <= fLimit; f++) {
    const bucket = buckets[f];
    if (!bucket) continue;
    for (let bi = 0; bi < bucket.length; bi++) {
      const node = bucket[bi];
      const kk = sKey(node.ro, node.army);
      if (visited.get(kk) < node.g) continue;
      if (ringOf(node.ro.r, node.ro.c) === 1) {
        const result = { par: node.g + 1, nodes };
        if (wantPath) {
          const path = [];
          let ck = kk;
          while (ck) {
            const ent = parent.get(ck);
            if (ent) path.unshift(ent.ep);
            ck = ent ? ent.pk : null;
          }
          result.path = path;
        }
        return result;
      }
      if (++nodes > maxNodes) return null;
      for (const ep of roninOptions(node.ro, node.army, stairs, steps)) {
        const rep = armyReply(ep, node.army, stairs);
        if (rep.captured) continue;
        const g2 = node.g + 1;
        const f2 = g2 + h(ep.r, ep.c);
        if (f2 > fLimit) continue;
        const child = { ro: { r: ep.r, c: ep.c }, army: rep.army, g: g2 };
        const ck = sKey(child.ro, child.army);
        const prevG = visited.get(ck);
        if (prevG !== undefined && prevG <= g2) continue;
        visited.set(ck, g2);
        if (wantPath) parent.set(ck, { pk: kk, ep: { r: ep.r, c: ep.c, hold: !!ep.hold } });
        push(f2, child);
      }
    }
  }
  return null;
}

// One candidate layout from an RNG stream: gates, ronin start, army.
// RNG call order must NEVER change — it defines every published board.
function genCandidate(rng) {
  const stairs = new Set();
  const sidesO = shuffle([0, 1, 2, 3], rng).slice(0, 3);
  for (const s of sidesO) {
    const off = 3 + Math.floor(rng() * 7);
    let r, c;
    if (s === 0) { r = 2; c = off; } else if (s === 1) { r = off; c = 10; }
    else if (s === 2) { r = 10; c = off; } else { r = off; c = 2; }
    stairs.add(key(r, c));
  }
  const sidesI = shuffle([0, 1, 2, 3], rng).slice(0, 2);
  for (const s of sidesI) {
    const off = 5 + Math.floor(rng() * 3);
    let r, c;
    if (s === 0) { r = 4; c = off; } else if (s === 1) { r = off; c = 8; }
    else if (s === 2) { r = 8; c = off; } else { r = off; c = 4; }
    stairs.add(key(r, c));
  }
  const [sr, sc] = START_TILES[Math.floor(rng() * 8)];
  const ronin = { r: sr, c: sc };

  const bottom = [], middle = [], inner = [];
  for (let r = 0; r < 13; r++) for (let c = 0; c < 13; c++) {
    const d = ringOf(r, c);
    if (stairs.has(key(r, c))) continue;
    if (d >= 5) { if (cheb(r, c, ronin.r, ronin.c) >= 4) bottom.push({ r, c }); }
    else if (d >= 3) middle.push({ r, c });
    else if (d === 2) inner.push({ r, c });
  }
  shuffle(bottom, rng); shuffle(middle, rng); shuffle(inner, rng);
  const army = [...bottom.slice(0, 6), ...middle.slice(0, 4), ...inner.slice(0, 2)];
  if (army.length !== 12) return null;
  return { ronin, army, stairs };
}

// Deterministic: same seed + mode → same accepted board on every client.
function generateFromSeed(seedBase, mc) {
  if (!mc || !mc.steps) throw new Error('mode config required');
  let fallback = null;
  for (let t = 0; t < GEN_MAX_TRIES; t++) {
    const rng = mulberry32(hash32(seedBase, t));
    const cand = genCandidate(rng);
    if (!cand) continue;
    const res = solveBoard(cand, { fLimit: mc.parMax, maxNodes: 60000, steps: mc.steps });
    if (!res) continue;
    if (res.par >= mc.parMin) return { ...cand, par: res.par, genTries: t + 1 };
    if (!fallback) fallback = { ...cand, par: res.par, genTries: t + 1 };
  }
  return fallback;
}

const dailyBoard = (dayNum, mc) => generateFromSeed(hash32(mc.salt, dayNum), mc);
const practiceBoard = (seed, mc) => generateFromSeed(hash32(hash32(0x50524143, mc.salt), seed), mc);

  return {
    N, C, ARMY_MOVES, MODES, START_TILES,
    key, cheb, ringOf, tierOf, hash32, mulberry32, dayNumber,
    stepLegal, armyReply, roninOptions, pathTo, solveBoard,
    genCandidate, generateFromSeed, dailyBoard, practiceBoard,
  };
})();
</script>

<script>
(() => {
  const RE = RoninEngine;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');

  // ---------- palette ----------
  // Palette from the traditional card: 蕉鹃 forest / 唐茶 rooftops / 粉白 palace /
  // 砖红 emperor+ronin / 幽冥 guards+ink.
  const COL = {
    outer: '#dbcfae', middle: '#e9e0c4', inner: '#f7f1de', emperorTile: '#a63b31',
    stair: '#7a5a39', stairLine: 'rgba(246,239,220,.75)',
    wall: '#42382f',
    grid: 'rgba(58,50,43,.10)',
    ronin: '#c1443a', roninRing: '#8c2f27', roninMark: '#f6efdc',
    guard: '#453c37', guardRing: 'rgba(236,228,207,.55)', guardEye: '#a63b31',
    emperor: '#e3b23c', emperorSun: '#f6efdc',
    path: '#42382f', pip: '#a63b31',
    hint: 'rgba(66,56,47,.35)',
    intent: '#42382f', danger: '#c1443a',
  };

  // ---------- game state ----------
  const G = {
    mode: 'daily', dayNum: 1, layout: null,
    diff: 'normal', diffCfg: null, // difficulty mode (normal/hard) — set before any board loads
    ronin: null, army: null,
    attempt: 1, squares: [null, null, null],
    moveCount: 0, finalMoves: null, sel: null, selPath: null, opts: [],
    busy: false, phase: 'play', // 'play' | 'done'
  };
  const vis = { ronin: { r: 0, c: 0 }, army: [] };
  let cell = 40, preview = null, flashT = 0;

  // ---------- storage ----------
  const SKEY = 'ronin.daily.v1';
  // schema v2: per-difficulty results/hints under s.modes; legacy v1 data was all
  // played under what is now HARD mode, so it migrates there (streaks preserved).
  function migrate(s) {
    if (s.modes) return s;
    s.modes = { normal: { results: {}, hints: {} }, hard: { results: s.results || {}, hints: s.hints || {} } };
    if (s.results && Object.keys(s.results).length) s.diff = s.diff || 'hard';
    delete s.results; delete s.hints; delete s.board;
    return s;
  }
  const readStore = () => { try { return migrate(JSON.parse(localStorage.getItem(SKEY)) || {}); } catch { return migrate({}); } };
  const writeStore = (s) => { try { localStorage.setItem(SKEY, JSON.stringify(s)); } catch {} };
  const modeState = (s) => s.modes[G.diff];
  function saveDay(done) {
    if (G.mode !== 'daily') return;
    const s = readStore();
    modeState(s).results[G.dayNum] = { squares: G.squares, moves: G.finalMoves, par: G.layout.par, done: !!done };
    writeStore(s);
  }
  // Daily boards are deterministic, so cache the generated layout per day+mode —
  // avoids re-running the solver (up to a few seconds on hard days) on every load.
  function cachedDailyBoard(dayNum, mc) {
    const s = readStore();
    const slot = s.boardCache && s.boardCache[mc.key];
    if (slot && slot.day === dayNum) {
      const c = slot.layout;
      return { ronin: c.ronin, army: c.army.map(p => ({ ...p })), stairs: new Set(c.stairs), par: c.par };
    }
    const layout = RE.dailyBoard(dayNum, mc);
    try {
      s.boardCache = s.boardCache || {};
      s.boardCache[mc.key] = { day: dayNum, layout: { ronin: layout.ronin, army: layout.army, stairs: [...layout.stairs], par: layout.par } };
      writeStore(s);
    } catch {}
    return layout;
  }

  // ---------- tween machinery ----------
  let tweens = [], afterFns = [];
  const ease = (k) => k < .5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2;
  function queueTween(target, to, dur) {
    if (document.hidden) { target.r = to.r; target.c = to.c; return; } // no animation on hidden tabs
    tweens.push({ target, to: { r: to.r, c: to.c }, dur, from: null, t0: null });
  }
  function afterTweens(fn) { if (!tweens.length) fn(); else afterFns.push(fn); }
  function stepTweens(now) {
    if (document.hidden) {
      // rAF is paused on hidden tabs — snap animations so game logic never stalls
      while (tweens.length) {
        const t0 = tweens.shift();
        t0.target.r = t0.to.r; t0.target.c = t0.to.c;
        if (!tweens.length) { const fns = afterFns; afterFns = []; fns.forEach(f => f()); }
      }
      return;
    }
    const t = tweens[0];
    if (!t) return;
    if (!t.t0) { t.t0 = now; t.from = { r: t.target.r, c: t.target.c }; }
    const k = Math.min(1, (now - t.t0) / t.dur);
    const e = ease(k);
    t.target.r = t.from.r + (t.to.r - t.from.r) * e;
    t.target.c = t.from.c + (t.to.c - t.from.c) * e;
    if (k >= 1) {
      t.target.r = t.to.r; t.target.c = t.to.c;
      tweens.shift();
      if (!tweens.length) { const fns = afterFns; afterFns = []; fns.forEach(f => f()); }
    }
  }
  function syncVis() {
    vis.ronin = { r: G.ronin.r, c: G.ronin.c };
    vis.army = G.army.map(p => ({ r: p.r, c: p.c }));
  }

  // ---------- layout / sizing ----------
  function resize() {
    // guard against 0-width reports (hidden tabs, bfcache restores)
    const availW = window.innerWidth >= 200 ? window.innerWidth : 562;
    cell = Math.floor(Math.min(520, availW - 42) / 13);
    const px = cell * 13, dpr = window.devicePixelRatio || 1;
    canvas.width = px * dpr; canvas.height = px * dpr;
    canvas.style.width = px + 'px'; canvas.style.height = px + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ---------- drawing ----------
  const cx = (c) => (c + .5) * cell, cy = (r) => (r + .5) * cell;
  function draw(now) {
    const px = cell * 13;
    ctx.clearRect(0, 0, px, px);
    const stairs = G.layout ? G.layout.stairs : new Set();

    // Elevation: paint each ring as a raised block (bottom-up) with a soft drop
    // shadow, so the castle reads as terraces — forest, rooftops, palace, throne.
    ctx.fillStyle = COL.outer;
    ctx.fillRect(0, 0, px, px);
    ctx.save();
    ctx.shadowColor = 'rgba(46,38,30,.55)'; ctx.shadowBlur = cell * .75;
    ctx.shadowOffsetX = cell * .26; ctx.shadowOffsetY = cell * .32;
    ctx.fillStyle = COL.middle;
    ctx.fillRect(2 * cell, 2 * cell, 9 * cell, 9 * cell);
    ctx.fillStyle = COL.inner;
    ctx.fillRect(4 * cell, 4 * cell, 5 * cell, 5 * cell);
    ctx.restore();

    // grid — one subtle tone across all rings
    ctx.strokeStyle = COL.grid; ctx.lineWidth = 1;
    for (let i = 1; i < 13; i++) {
      ctx.beginPath(); ctx.moveTo(i * cell + .5, 0); ctx.lineTo(i * cell + .5, px); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i * cell + .5); ctx.lineTo(px, i * cell + .5); ctx.stroke();
    }

    // stair tiles — inset inside their cell so they never cut the wall keyline
    const inset = Math.max(2, cell * .07);
    for (const k of stairs) {
      const r = Math.floor(k / 13), c = k % 13;
      const x = c * cell, y = r * cell;
      // the stair IS the transition: its gradient runs from the colour of the
      // tier it leaves (foot) to the colour of the tier it climbs into (top)
      const ring = RE.ringOf(r, c);
      // foot starts a few shades below the source tier (depth), top lands exactly
      // on the destination tier's colour — the stair climbs INTO the next terrace
      const from = ring === 4 ? '#b3a179' : '#c8bb93';
      const to = ring === 4 ? COL.middle : COL.inner;
      const vertical = Math.abs(r - 6) > Math.abs(c - 6);
      let g;
      if (vertical) g = (r < 6)
        ? ctx.createLinearGradient(x, y, x, y + cell)
        : ctx.createLinearGradient(x, y + cell, x, y);
      else g = (c < 6)
        ? ctx.createLinearGradient(x, y, x + cell, y)
        : ctx.createLinearGradient(x + cell, y, x, y);
      g.addColorStop(0, from);
      g.addColorStop(1, to);
      ctx.fillStyle = g;
      ctx.fillRect(x, y, cell, cell);
      // 4 thin treads running across the climb, lightening as they ascend
      let foot0, sign;
      if (vertical) { if (r < 6) { foot0 = y; sign = 1; } else { foot0 = y + cell; sign = -1; } }
      else { if (c < 6) { foot0 = x; sign = 1; } else { foot0 = x + cell; sign = -1; } }
      const fracs = [0.2, 0.4, 0.6, 0.8];
      const treadCols = ['rgba(74,58,38,.5)', 'rgba(98,79,53,.42)', 'rgba(126,106,73,.34)', 'rgba(154,133,98,.28)'];
      ctx.lineWidth = 1; // match the board grid
      for (let i = 0; i < 4; i++) {
        const a = foot0 + sign * fracs[i] * cell;
        ctx.strokeStyle = treadCols[i];
        ctx.beginPath();
        if (vertical) { ctx.moveTo(x + inset, a); ctx.lineTo(x + cell - inset, a); }
        else { ctx.moveTo(a, y + inset); ctx.lineTo(a, y + cell - inset); }
        ctx.stroke();
      }
    }

    // emperor tile — inset red tile, fully inside its cell
    {
      const x = 6 * cell + inset, y = 6 * cell + inset, w = cell - 2 * inset;
      ctx.save();
      ctx.shadowColor = 'rgba(46,38,30,.4)'; ctx.shadowBlur = cell * .18;
      ctx.shadowOffsetX = cell * .07; ctx.shadowOffsetY = cell * .09;
      ctx.fillStyle = COL.emperorTile;
      ctx.beginPath(); ctx.roundRect(x, y, w, w, 3); ctx.fill();
      ctx.restore();
    }

    // walls — uniform 2px keylines on every tier boundary (gaps at stairs) + outer edge
    ctx.lineCap = 'butt';
    ctx.strokeStyle = COL.wall; ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, px - 2, px - 2); // outer wall
    for (let r = 0; r < 13; r++) for (let c = 0; c < 13; c++) {
      const a = RE.tierOf(r, c);
      if (c < 12) {
        const b = RE.tierOf(r, c + 1);
        if (a !== b && !stairs.has(RE.key(r, c)) && !stairs.has(RE.key(r, c + 1))) {
          ctx.beginPath(); ctx.moveTo((c + 1) * cell, r * cell); ctx.lineTo((c + 1) * cell, (r + 1) * cell); ctx.stroke();
        }
      }
      if (r < 12) {
        const b = RE.tierOf(r + 1, c);
        if (a !== b && !stairs.has(RE.key(r, c)) && !stairs.has(RE.key(r + 1, c))) {
          ctx.beginPath(); ctx.moveTo(c * cell, (r + 1) * cell); ctx.lineTo((c + 1) * cell, (r + 1) * cell); ctx.stroke();
        }
      }
    }

    if (!G.layout) return;

    // legal-endpoint dots (round's input model: tap where you want to END)
    if (G.phase === 'play' && !G.busy) {
      ctx.fillStyle = COL.hint;
      for (const o of G.opts) {
        if (o.hold) continue;
        ctx.beginPath(); ctx.arc(cx(o.c), cy(o.r), cell * .11, 0, Math.PI * 2); ctx.fill();
      }
    }

    // pending move: dashed path along the shortest legal route + endpoint pip
    if (G.sel && G.selPath && G.phase === 'play' && !G.busy) {
      ctx.strokeStyle = COL.path; ctx.lineWidth = 2.5; ctx.setLineDash([6, 5]);
      ctx.beginPath();
      ctx.moveTo(cx(G.ronin.c), cy(G.ronin.r));
      for (const q of G.selPath) ctx.lineTo(cx(q.c), cy(q.r));
      ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = COL.pip;
      ctx.beginPath(); ctx.arc(cx(G.sel.c), cy(G.sel.r), cell * .17, 0, Math.PI * 2); ctx.fill();
      if (preview && preview.captured) {
        ctx.strokeStyle = COL.danger; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(cx(G.sel.c), cy(G.sel.r), cell * .38, 0, Math.PI * 2); ctx.stroke();
      }
    }

    // guard intent arrows
    if (preview) {
      for (const m of preview.moves) {
        const isCap = preview.captured && m === preview.moves[preview.moves.length - 1];
        ctx.strokeStyle = ctx.fillStyle = isCap ? COL.danger : COL.intent;
        ctx.lineWidth = 3;
        const x1 = cx(m.from.c), y1 = cy(m.from.r), x2 = cx(m.to.c), y2 = cy(m.to.r);
        const ang = Math.atan2(y2 - y1, x2 - x1);
        const sx = x1 + Math.cos(ang) * cell * .46, sy = y1 + Math.sin(ang) * cell * .46;
        const ex = x1 + Math.cos(ang) * cell * .78, ey = y1 + Math.sin(ang) * cell * .78;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(ex + Math.cos(ang) * 7, ey + Math.sin(ang) * 7);
        ctx.lineTo(ex + Math.cos(ang + 2.5) * 6, ey + Math.sin(ang + 2.5) * 6);
        ctx.lineTo(ex + Math.cos(ang - 2.5) * 6, ey + Math.sin(ang - 2.5) * 6);
        ctx.closePath(); ctx.fill();
      }
    }

    // emperor — red disc filling the inset tile, small pale sun crest
    const ex0 = cx(6), ey0 = cy(6);
    {
      // gold sun disc with red core — the throne should be impossible to miss
      ctx.save();
      ctx.shadowColor = 'rgba(46,38,30,.38)'; ctx.shadowBlur = cell * .12;
      ctx.shadowOffsetX = cell * .05; ctx.shadowOffsetY = cell * .07;
      const eg = ctx.createRadialGradient(ex0, ey0, 0, ex0, ey0, cell * .27);
      eg.addColorStop(0, '#c3922f');
      eg.addColorStop(.6, '#cd9c39');
      eg.addColorStop(.88, '#f2cd6f');
      eg.addColorStop(1, '#d3a344');
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(ex0, ey0, cell * .27, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = COL.emperorTile;
      ctx.beginPath(); ctx.arc(ex0, ey0, cell * .13, 0, Math.PI * 2); ctx.fill();
    }
    if (canAscend() && !G.sel && !G.busy && G.phase === 'play') {
      ctx.strokeStyle = COL.emperor; ctx.lineWidth = 2.5; ctx.globalAlpha = .55 + .4 * Math.sin(now / 260);
      ctx.beginPath(); ctx.arc(ex0, ey0, cell * (.30 + .05 * Math.sin(now / 260)), 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // pieces fill their square with a small even gap all round
    const pieceR = cell * .5 - Math.max(2.5, cell * .08);

    // guards — backgammon stones: flat dark body, bright bevel ring at the rim
    ctx.save();
    ctx.shadowColor = 'rgba(46,38,30,.38)'; ctx.shadowBlur = cell * .12;
    ctx.shadowOffsetX = cell * .05; ctx.shadowOffsetY = cell * .07;
    for (const g of vis.army) {
      const x = cx(g.c), y = cy(g.r);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, pieceR);
      grad.addColorStop(0, '#332b26');
      grad.addColorStop(.6, '#332b26');
      grad.addColorStop(1, '#483e35');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, pieceR, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    // ronin — red like the Emperor's line, marked by a curved katana slash
    {
      const x = cx(vis.ronin.c), y = cy(vis.ronin.r);
      const r = pieceR;
      ctx.save();
      ctx.shadowColor = 'rgba(46,38,30,.4)'; ctx.shadowBlur = cell * .12;
      ctx.shadowOffsetX = cell * .05; ctx.shadowOffsetY = cell * .07;
      const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
      rg.addColorStop(0, '#9c352d');
      rg.addColorStop(.6, '#9c352d');
      rg.addColorStop(1, '#bf4e44');
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      // curved katana slash, tapered points — gold, echoing the Emperor
      ctx.fillStyle = '#e6ba48';
      ctx.beginPath();
      ctx.moveTo(x - r * .62, y + r * .66);
      ctx.quadraticCurveTo(x + r * .52, y + r * .42, x + r * .66, y - r * .62);
      ctx.quadraticCurveTo(x + r * .24, y + r * .12, x - r * .62, y + r * .66);
      ctx.closePath(); ctx.fill();
    }

    // capture flash — time-based decay so it fades correctly even if frames were skipped
    if (flashT > 0) {
      const left = flashT - performance.now();
      if (left > 0) {
        ctx.fillStyle = `rgba(211,49,37,${Math.min(.4, left / 500 * .4)})`;
        ctx.fillRect(0, 0, px, px);
      } else flashT = 0;
    }
  }

  function loop(now) { stepTweens(now); draw(now); requestAnimationFrame(loop); }
  // guarantees tween/turn progress even when the tab is hidden and rAF is paused
  setInterval(() => { if (document.hidden) stepTweens(performance.now()); }, 120);

  // ---------- rules helpers ----------
  const guardAt = (r, c) => G.army.some(p => p.r === r && p.c === c);
  const canAscend = () => G.layout && RE.ringOf(G.ronin.r, G.ronin.c) === 1;
  function refreshHints() {
    preview = null;
    if (!G.layout || G.phase !== 'play') { G.opts = []; G.sel = null; G.selPath = null; updateButtons(); return; }
    G.opts = RE.roninOptions(G.ronin, G.army, G.layout.stairs, G.diffCfg.steps);
    if (G.sel && !G.opts.some(o => !!o.hold === !!G.sel.hold && o.r === G.sel.r && o.c === G.sel.c)) {
      G.sel = null; G.selPath = null;
    }
    if (G.sel) {
      G.selPath = RE.pathTo(G.ronin, G.army, G.layout.stairs, G.sel, G.diffCfg.steps);
      if (!G.selPath) { G.sel = null; }
      else preview = RE.armyReply({ r: G.sel.r, c: G.sel.c }, G.army, G.layout.stairs);
    } else G.selPath = null;
    updateButtons();
  }

  // ---------- HUD ----------
  const $ = (id) => document.getElementById(id);
  function setMsg(m) { $('status').textContent = m; }
  function updateHud() {
    $('practiceChip').style.display = G.mode === 'practice' ? 'inline-block' : 'none';
    const dots = $('attemptDots');
    dots.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('span');
      d.className = 'adot' + (G.squares[i] === 'f' ? ' f' : G.squares[i] === 'w' ? ' w' : (i === G.attempt - 1 && G.phase === 'play') ? ' cur' : '');
      dots.appendChild(d);
    }
  }
  function updateButtons() {
    const play = G.phase === 'play' && !G.busy;
    $('moveBtn').disabled = !play || !G.sel;
    $('undoBtn').disabled = !play || !G.sel;
    $('holdBtn').disabled = !play || !!G.sel;
    $('moveBtn').classList.toggle('danger', !!(preview && preview.captured));
    $('moveBtn').textContent = preview && preview.captured ? 'MOVE ⚠' : 'MOVE';
    $('rescueBtn').style.display = (play && canAscend() && !G.sel) ? 'inline-block' : 'none';
    $('hintBtn').style.display = hintAvailable() ? 'inline-block' : 'none';
    $('hintBtn').disabled = !play;
  }

  // ---------- turn flow ----------
  function executeMove() {
    if (G.phase !== 'play' || G.busy || !G.sel || !G.selPath || modalOpen()) return;
    G.busy = true;
    const endpoint = { r: G.sel.r, c: G.sel.c };
    const rep = RE.armyReply(endpoint, G.army, G.layout.stairs);
    for (const q of G.selPath) queueTween(vis.ronin, q, 150);
    G.ronin = endpoint;
    G.moveCount++;
    G.sel = null; G.selPath = null; G.opts = [];
    preview = null;
    updateHud(); updateButtons();
    afterTweens(() => {
      for (const m of rep.moves) queueTween(vis.army[m.i], m.to, 170);
      afterTweens(() => {
        G.army = rep.army; syncVis();
        if (rep.captured) { flashT = performance.now() + 500; attemptFailed('captured'); return; }
        G.busy = false;
        postChecks();
      });
    });
  }

  function hold() {
    if (G.phase !== 'play' || G.busy || G.sel || modalOpen()) return;
    if (!RE.roninOptions(G.ronin, G.army, G.layout.stairs, G.diffCfg.steps).length) return;
    G.busy = true;
    G.moveCount++;
    const rep = RE.armyReply(G.ronin, G.army, G.layout.stairs);
    setMsg('You hold your ground…');
    updateHud();
    for (const m of rep.moves) queueTween(vis.army[m.i], m.to, 170);
    afterTweens(() => {
      G.army = rep.army; syncVis();
      if (rep.captured) { flashT = performance.now() + 500; attemptFailed('captured'); return; }
      G.busy = false;
      postChecks();
    });
  }

  function ascend() {
    if (G.phase !== 'play' || G.busy || G.sel || !canAscend() || modalOpen()) return;
    G.moveCount++;
    G.finalMoves = G.moveCount;
    G.squares[G.attempt - 1] = 'w';
    finalizeDay(true);
  }

  // One hint per castle: the old maps mark the solver's optimal next move from
  // the current position. Costs your only lantern; stamps 🏮 on the share result.
  function hintAvailable() {
    if (G.phase !== 'play' || !G.layout) return false;
    if (G.mode === 'daily') { const s = readStore(); return !modeState(s).hints[G.dayNum]; }
    return !G.hintUsed;
  }
  function markHintUsed() {
    if (G.mode === 'daily') { const s = readStore(); modeState(s).hints[G.dayNum] = true; writeStore(s); }
    else G.hintUsed = true;
  }
  async function useHint() {
    if (!hintAvailable() || G.busy || modalOpen()) return;
    G.busy = true;
    G.sel = null; G.selPath = null; preview = null;
    setMsg('Consulting the old maps… 🏮');
    updateButtons();
    await new Promise(r => setTimeout(r, 40)); // let the status paint before the solve
    const res = RE.solveBoard({ ronin: G.ronin, army: G.army, stairs: G.layout.stairs },
      { fLimit: G.diffCfg.parMax, maxNodes: 500000, wantPath: true, steps: G.diffCfg.steps });
    markHintUsed();
    G.busy = false;
    if (!res) {
      setMsg('The maps show no way in from here — learn what you can, and fall back. 🏮');
      refreshHints(); updateHud();
      return;
    }
    if (!res.path.length) {
      setMsg('The way is open — tap the Emperor and end this. 🏮');
      refreshHints(); updateHud();
      return;
    }
    const ep = res.path[0];
    G.sel = ep.hold ? { r: G.ronin.r, c: G.ronin.c, hold: true } : { r: ep.r, c: ep.c };
    refreshHints(); updateHud();
    if (!G.sel) { setMsg('The maps are smudged here — trust your instincts. 🏮'); return; }
    setMsg(`The old maps mark a route — rescue in ${res.par} from here. Take it, or find your own. 🏮`);
  }

  // After a lost day: animate the solver's optimal line so the player sees the way in.
  async function revealSolution(won) {
    if (G.phase !== 'done' || G.busy || G.revealing) return;
    G.revealing = true; G.busy = true;
    closeModal();
    G.ronin = { ...G.layout.ronin };
    G.army = G.layout.army.map(p => ({ ...p }));
    G.sel = null; G.selPath = null; G.opts = []; preview = null;
    syncVis(); updateHud();
    setMsg('Consulting the old maps…');
    await new Promise(r => setTimeout(r, 60)); // let the status paint before the solve
    const res = RE.solveBoard({ ronin: G.ronin, army: G.army, stairs: G.layout.stairs },
      { fLimit: G.diffCfg.parMax, maxNodes: 500000, wantPath: true, steps: G.diffCfg.steps });
    if (!res || !res.path) { setMsg('The path is lost to history.'); G.busy = false; G.revealing = false; return; }
    let moveNo = 0;
    for (const ep of res.path) {
      const steps = RE.pathTo(G.ronin, G.army, G.layout.stairs, ep, G.diffCfg.steps);
      if (!steps) break;
      for (const s of steps) queueTween(vis.ronin, s, 260);
      G.ronin = { r: ep.r, c: ep.c };
      moveNo++;
      G.moveCount = moveNo; updateHud();
      setMsg(ep.hold ? `Move ${moveNo}: hold — let the guards drift…` : `Move ${moveNo} of ${res.par}…`);
      await new Promise(r => afterTweens(r));
      const rep = RE.armyReply(G.ronin, G.army, G.layout.stairs);
      for (const m of rep.moves) queueTween(vis.army[m.i], m.to, 240);
      G.army = rep.army;
      await new Promise(r => afterTweens(r));
      if (!document.hidden) await new Promise(r => setTimeout(r, 200)); // beat between turns
    }
    moveNo++;
    G.moveCount = moveNo; updateHud();
    setMsg(won
      ? `Move ${moveNo}: Ascend ⛩ — par ${G.layout.par}, the old maps' route. Yours: ${G.finalMoves}.`
      : `Move ${moveNo}: Ascend ⛩ — that was the way in. Par ${G.layout.par}. Tomorrow, it's yours.`);
    G.busy = false; G.revealing = false;
  }

  function postChecks() {
    const opts = RE.roninOptions(G.ronin, G.army, G.layout.stairs, G.diffCfg.steps);
    if (canAscend()) setMsg('Beside the Emperor — tap him (or RESCUE) to finish! ⛩');
    else if (!opts.length) { attemptFailed('cornered'); return; }
    else setMsg('');
    refreshHints(); updateHud();
  }

  function attemptFailed(reason) {
    G.busy = false;
    G.squares[G.attempt - 1] = 'f';
    updateHud();
    const capturedMsg = reason === 'cornered' ? `Cornered on move ${G.moveCount}` : `Captured on move ${G.moveCount}`;
    if (G.attempt < 3) {
      saveDay(false);
      openModal(`
        <h2 style="text-align:center">You have been overwhelmed</h2>
        <div style="text-align:center;color:var(--ink-soft);font-size:13px;letter-spacing:2px;margin-top:2px">attempt ${G.attempt} of 3</div>
        <p style="text-align:center;color:var(--ink-soft);margin:14px 0 4px">The castle resets, the guards return to their posts.</p>
        <p style="text-align:center;margin:4px 0 2px"><b><i>You know their ways a little better now.</i></b></p>
        <button class="primary" id="retryBtn">Attempt ${G.attempt + 1}</button>
      `);
      $('retryBtn').onclick = (e) => {
        e.target.disabled = true; e.target.onclick = null; // double-tap must not skip an attempt
        closeModal(); G.attempt++; resetAttempt();
      };
    } else {
      finalizeDay(false);
    }
  }

  function resetAttempt() {
    G.ronin = { ...G.layout.ronin };
    G.army = G.layout.army.map(p => ({ ...p }));
    G.moveCount = 0; G.sel = null; G.selPath = null; G.busy = false;
    syncVis();
    setMsg(`Attempt ${G.attempt} — reach the Emperor.`);
    refreshHints(); updateHud();
  }

  function finalizeDay(won) {
    G.phase = 'done';
    G.busy = false;
    saveDay(true);
    updateHud(); updateButtons();
    if (document.hidden) showEndModal(won);
    else setTimeout(() => showEndModal(won), won ? 250 : 650);
  }

  // ---------- modals ----------
  function openModal(html) { $('modalContent').innerHTML = html; $('overlay').classList.add('open'); }
  function closeModal() { $('overlay').classList.remove('open'); }
  const modalOpen = () => $('overlay').classList.contains('open');
  $('modalX').onclick = closeModal;
  $('overlay').onclick = (e) => { if (e.target === $('overlay')) closeModal(); };

  function squaresStr() { return G.squares.map(s => s === 'w' ? '🟩' : s === 'f' ? '🟥' : '⬜').join(''); }
  const resDots = () => `<div class="resDots">${G.squares.map(s =>
    `<span class="${s === 'w' ? 'w' : s === 'f' ? 'f' : ''}"></span>`).join('')}</div>`;
  function shareText() {
    const w = G.squares.indexOf('w');
    const s = readStore();
    const lantern = modeState(s).hints[G.dayNum] ? ' 🏮' : '';
    const tag = G.diff === 'hard' ? ' ⚔HARD' : '';
    const head = `RONIN #${G.dayNum}${tag} ${squaresStr()}${lantern}`;
    const line = w >= 0
      ? `Rescued on attempt ${w + 1} · ${G.finalMoves} moves (par ${G.layout.par})${G.finalMoves === G.layout.par ? ' — perfect ⚔️' : ''}`
      : `The Emperor waits… (par ${G.layout.par})`;
    return head + '\n' + line;
  }

  function calcStats() {
    const results = modeState(readStore()).results;
    const today = RE.dayNumber();
    let played = 0, wins = 0, dist = [0, 0, 0];
    for (const d of Object.keys(results)) {
      const r = results[d];
      if (!r.done) continue;
      played++;
      const w = r.squares.indexOf('w');
      if (w >= 0) { wins++; dist[w]++; }
    }
    const winsOn = (d) => { const r = results[d]; return r && r.done && r.squares.includes('w'); };
    let cur = 0;
    for (let d = (results[today] && results[today].done) ? today : today - 1; d >= 1; d--) {
      if (winsOn(d)) cur++; else break;
    }
    let max = 0, run = 0;
    for (let d = 1; d <= today; d++) {
      if (winsOn(d)) { run++; max = Math.max(max, run); }
      else if (results[d] || d < today) run = 0;
    }
    return { played, wins, cur, max, dist };
  }

  function statsHtml(includeDist = true) {
    const s = calcStats();
    const pc = s.played ? Math.round(100 * s.wins / s.played) : 0;
    const maxD = Math.max(1, ...s.dist);
    return `
      <div class="statgrid">
        <div><div class="n">${s.played}</div><div class="l">played</div></div>
        <div><div class="n">${pc}</div><div class="l">win %</div></div>
        <div><div class="n">${s.cur}</div><div class="l">streak</div></div>
        <div><div class="n">${s.max}</div><div class="l">best</div></div>
      </div>
      ${includeDist ? `<div class="dist">
        ${[0, 1, 2].map(i => `
          <div class="row"><span>attempt ${i + 1}</span>
          <span class="bar" style="width:${Math.max(8, 90 * s.dist[i] / maxD)}%">${s.dist[i]}</span></div>`).join('')}
      </div>` : ''}`;
  }

  let cdTimer = null;
  function countdownHtml() { return `<div id="countdown"></div>`; }
  function startCountdown() {
    const el = $('countdown');
    if (!el) return;
    clearInterval(cdTimer);
    const tick = () => {
      const now = new Date();
      const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0);
      const ms = next - now;
      const h = String(Math.floor(ms / 3600000)).padStart(2, '0');
      const m = String(Math.floor(ms / 60000) % 60).padStart(2, '0');
      const s = String(Math.floor(ms / 1000) % 60).padStart(2, '0');
      const e = $('countdown');
      if (!e) { clearInterval(cdTimer); return; }
      e.textContent = `next castle in ${h}:${m}:${s}`;
    };
    tick(); cdTimer = setInterval(tick, 1000);
  }

  function showEndModal(won) {
    const w = G.squares.indexOf('w');
    const perfect = won && G.finalMoves === G.layout.par;
    const headline = won
      ? `${G.finalMoves} moves · par ${G.layout.par}${perfect ? ' — <b>perfect ⚔️</b>' : ''}`
      : `The Emperor waits… <b>(par ${G.layout.par})</b>`;
    const isDaily = G.mode === 'daily';
    openModal(`
      <h2 style="text-align:center;margin-bottom:1px">${won ? 'The Emperor is free' : 'You have been overwhelmed'}</h2>
      <div class="splashSub">${isDaily ? 'RONIN #' + G.dayNum : 'PRACTICE'}${G.diff === 'hard' ? ' · ⚔ HARD' : ''}</div>
      ${resDots()}
      <div class="headline" style="margin:2px 0 12px">${headline}</div>
      ${!won ? `<button class="primary" id="revealBtn" style="background:var(--gold);color:var(--ink)">REVEAL THE WAY IN ⛩</button>`
             : (G.finalMoves > G.layout.par ? `<button class="primary" id="revealBtn" style="background:var(--gold);color:var(--ink)">HOW TO GET TO PAR ⛩</button>` : '')}
      ${isDaily ? `<button class="primary" id="shareBtn">SHARE RESULT</button><div id="shareFeedback"></div>` : ''}
      ${isDaily ? statsHtml(false) : ''}
      ${isDaily ? countdownHtml() : ''}
      <div style="text-align:center;margin-top:3px;font-size:13px">
        <a id="practiceLink2" style="color:var(--indigo);cursor:pointer;text-decoration:underline">
          ${isDaily ? 'practice on a random castle' : 'another random castle'}</a>
      </div>
    `);
    if (isDaily) {
      $('shareBtn').onclick = async () => {
        try { await navigator.clipboard.writeText(shareText()); $('shareFeedback').textContent = 'copied to clipboard!'; }
        catch { $('shareFeedback').textContent = shareText().replace('\n', ' — '); }
      };
      startCountdown();
    }
    const rb = $('revealBtn');
    if (rb) rb.onclick = () => { rb.disabled = true; revealSolution(won); };
    $('practiceLink2').onclick = () => { closeModal(); startPractice(); };
  }

  function showHelp() {
    openModal(`
      <h2>RONIN</h2>
      <p style="margin:4px 0;color:var(--ink-soft);font-size:14px">The Emperor is held at the heart of the castle. You are the only one coming for him.</p>
      <ul>
        <li><b>Move:</b> tap a marked cell — <b>3 a turn</b> (2 on hard). Tap again to commit; <b>HOLD</b> waits.</li>
        <li><b>Walls:</b> three rings circle the Emperor — cross only at the <b>stair tiles</b>.</li>
        <li><b>Guards:</b> the two nearest chase each move — arrows show who. Reach you: <b>captured</b>.</li>
        <li><b>Rescue:</b> reach a tile beside the Emperor, tap him. Match <b>par</b> for perfect.</li>
        <li><b>Daily:</b> same castle for all, <b>3 attempts</b> — every failure teaches their ways.</li>
        <li><b>Hint:</b> once per castle; marks your best move. Your share carries the lantern.</li>
      </ul>
      <button class="primary" id="beginBtn">BEGIN</button>
    `);
    $('beginBtn').onclick = () => {
      closeModal();
      const s = readStore(); s.seenHelp = true; writeStore(s);
    };
  }

  // ---------- input ----------
  canvas.addEventListener('click', (ev) => {
    if (!G.layout || G.phase !== 'play' || G.busy || modalOpen()) return;
    const rect = canvas.getBoundingClientRect();
    const x = ev.clientX - rect.left, y = ev.clientY - rect.top;
    const c = Math.floor(x / cell), r = Math.floor(y / cell);
    if (r < 0 || r > 12 || c < 0 || c > 12) return;

    if (r === 6 && c === 6) {
      if (canAscend() && !G.sel) ascend();
      else setMsg('Reach a tile beside the Emperor first, inside the keep.');
      return;
    }
    // round's input model: snap to the nearest legal endpoint within tolerance
    let best = null, bd = 1e9;
    for (const o of G.opts) {
      if (o.hold) continue;
      const d = Math.hypot(cx(o.c) - x, cy(o.r) - y);
      if (d < bd) { bd = d; best = o; }
    }
    const tol = Math.max(22, cell * .75);
    if (best && bd <= tol) {
      if (G.sel && !G.sel.hold && G.sel.r === best.r && G.sel.c === best.c) { executeMove(); return; } // second tap commits
      G.sel = { r: best.r, c: best.c };
      refreshHints();
      setMsg(preview && preview.captured ? 'That path ends in capture — the guards will take you. ⚠' : 'Tap again, or hit MOVE.');
      return;
    }
    // not a legal endpoint — explain, and clear any pending selection
    if (guardAt(r, c)) setMsg('A guard holds that tile.');
    else if (r === G.ronin.r && c === G.ronin.c) setMsg('');
    else setMsg('Out of reach this turn — cross walls at the stair tiles.');
    G.sel = null; G.selPath = null;
    refreshHints();
  });

  document.addEventListener('keydown', (e) => {
    if (modalOpen()) { if (e.key === 'Escape') closeModal(); return; }
    if (e.key === 'Enter') executeMove();
    else if (e.key === 'Backspace') { if (G.sel) { G.sel = null; G.selPath = null; refreshHints(); } e.preventDefault(); }
    else if (e.key === 'Escape') { G.sel = null; G.selPath = null; refreshHints(); }
    else if (e.key === 'h' || e.key === 'H') hold();
  });

  $('moveBtn').onclick = executeMove;
  $('hintBtn').onclick = useHint;
  $('holdBtn').onclick = hold;
  $('undoBtn').onclick = () => { if (G.sel) { G.sel = null; G.selPath = null; refreshHints(); } };
  $('rescueBtn').onclick = ascend;
  $('helpBtn').onclick = showHelp;
  const modeSegHtml = () => `
    <div class="modeRow">difficulty<br/>
      <span id="modeSeg">
        <button data-diff="normal" class="${G.diff === 'normal' ? 'on' : ''}">normal</button>
        <button data-diff="hard" class="${G.diff === 'hard' ? 'on' : ''}">hard</button>
      </span>
    </div>`;
  const wireModeSeg = () => document.querySelectorAll('#modeSeg button').forEach(b => { b.onclick = () => setDiff(b.dataset.diff); });
  $('statsBtn').onclick = () => { openModal(`<h2>Statistics</h2>${statsHtml()}${modeSegHtml()}${countdownHtml()}`); wireModeSeg(); startCountdown(); };
  $('practiceLink').onclick = () => startPractice();

  // ---------- game setup ----------
  function beginBoard(layout, mode) {
    G.mode = mode;
    G.layout = layout;
    G.attempt = 1; G.squares = [null, null, null];
    G.moveCount = 0; G.finalMoves = null; G.sel = null; G.selPath = null;
    G.phase = 'play'; G.busy = false; G.hintUsed = false;
    G.ronin = { ...layout.ronin };
    G.army = layout.army.map(p => ({ ...p }));
    syncVis(); refreshHints(); updateHud();
    $('status').innerHTML = `<b><i>Rescue the Emperor in the tower.</i></b><br>Tap a marked cell to plan your move — up to ${G.diffCfg.steps} cells a turn.`;
  }

  function startPractice(seed) {
    closeModal();
    $('veil').style.display = 'flex';
    $('veil').textContent = 'forging a random castle…';
    setTimeout(() => {
      const s = seed ?? Math.floor(Math.random() * 2 ** 31);
      const layout = RE.practiceBoard(s, G.diffCfg);
      beginBoard(layout, 'practice');
      G.practiceSeed = s;
      $('veil').style.display = 'none';
    }, 30);
  }

  function startDaily() {
    const s0 = readStore();
    writeStore(s0); // persist migration once at boot
    G.diff = (s0.diff === 'hard' || s0.diff === 'normal') ? s0.diff : 'normal';
    G.diffCfg = RE.MODES[G.diff];
    const dayNum = Math.max(1, RE.dayNumber());
    G.dayNum = dayNum;
    $('veil').style.display = 'flex';
    setTimeout(() => {
      const layout = cachedDailyBoard(dayNum, G.diffCfg);
      const saved = modeState(readStore()).results[dayNum];
      beginBoard(layout, 'daily');
      if (saved) {
        G.squares = saved.squares.slice(0, 3);
        while (G.squares.length < 3) G.squares.push(null);
        if (saved.done) {
          G.phase = 'done';
          G.finalMoves = saved.moves;
          if (saved.moves != null) G.moveCount = saved.moves;
          updateHud(); updateButtons();
          setMsg('Today’s rescue is decided — return tomorrow, or practice below.');
          showEndModal(saved.squares.includes('w'));
        } else {
          G.attempt = G.squares.filter(s => s !== null).length + 1;
          setMsg(`Attempt ${G.attempt} — reach the Emperor.`);
          updateHud();
        }
      }
      $('veil').style.display = 'none';
      if (!readStore().seenHelp) showHelp();
    }, 30);
  }

  // difficulty switcher
  function setDiff(key) {
    if (!RE.MODES[key] || key === G.diff || G.busy || tweens.length || G.revealing) return;
    const s = readStore(); s.diff = key; writeStore(s);
    closeModal();
    startDaily();
  }
  // day rollover notice
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && G.mode === 'daily' && RE.dayNumber() !== G.dayNum) {
      setMsg('A new castle has risen — refresh to play today’s puzzle.');
    }
  });

  // ---------- debug hooks (console only) ----------
  const waitIdle = () => new Promise(res => {
    if (!G.busy && !tweens.length) return res();
    const t = setInterval(() => { if (!G.busy && !tweens.length) { clearInterval(t); res(); } }, 25);
  });
  window.RoninDebug = {
    G, RE, vis, startPractice, executeMove, hold, ascend, revealSolution, useHint, shareText, setDiff,
    async autoWin() {
      while (G.phase === 'play') {
        await waitIdle();
        if (G.phase !== 'play') break;
        if (canAscend()) { ascend(); break; }
        const res = RE.solveBoard({ ronin: G.ronin, army: G.army, stairs: G.layout.stairs }, { fLimit: 40, maxNodes: 400000, wantPath: true, steps: G.diffCfg.steps });
        if (!res || !res.path || !res.path.length) return 'no solution from here';
        const ep = res.path[0];
        G.sel = ep.hold ? { r: G.ronin.r, c: G.ronin.c, hold: true } : { r: ep.r, c: ep.c };
        refreshHints();
        if (!G.sel || !G.selPath) return 'unwalkable endpoint';
        executeMove();
      }
      await waitIdle();
      return 'done';
    },
    async holdUntilCaught(maxTurns = 40) {
      for (let i = 0; i < maxTurns && G.phase === 'play'; i++) {
        await waitIdle();
        if (G.phase !== 'play' || G.busy) break;
        hold();
      }
      await waitIdle();
      return G.phase;
    },
  };

  // ---------- boot ----------
  resize();
  requestAnimationFrame(loop);
  startDaily();
})();
</script>
</body>
</html>
